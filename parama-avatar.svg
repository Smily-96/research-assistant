<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Galaxy background -->
  <circle cx="50" cy="50" r="50" fill="#000011" />

  <!-- Stars -->
  <circle cx="20" cy="20" r="1" fill="white" />
  <circle cx="80" cy="15" r="1" fill="white" />
  <circle cx="15" cy="70" r="1" fill="white" />
  <circle cx="85" cy="80" r="1" fill="white" />
  <circle cx="50" cy="10" r="1" fill="white" />
  <circle cx="90" cy="50" r="1" fill="white" />
  <circle cx="10" cy="50" r="1" fill="white" />
  <circle cx="50" cy="90" r="1" fill="white" />

  <!-- 3 Concentric circles -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="gold" stroke-width="2" />
  <circle cx="50" cy="50" r="30" fill="none" stroke="gold" stroke-width="2" />
  <circle cx="50" cy="50" r="20" fill="none" stroke="gold" stroke-width="2" />

  <!-- Central point -->
  <circle cx="50" cy="50" r="3" fill="gold" />
</svg>